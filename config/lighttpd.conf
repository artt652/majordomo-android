server.modules = (
    "mod_indexfile",
    "mod_access",
    "mod_alias",
    "mod_rewrite",
    "mod_fastcgi",
    "mod_staticfile"
)

server.document-root = "HTDOCS_PATH"
server.port          = 8080
server.errorlog      = "HTDOCS_PATH/cycle_cached/lighttpd_error.log"

server.max-keep-alive-requests = 10
server.max-keep-alive-idle     = 10
server.max-connections         = 256

index-file.names = ("index.php", "index.html")

# Внешний пул — php-cgi запускается отдельно с PHP_FCGI_CHILDREN=4
# TCP вместо Unix socket: на Android SELinux блокирует accept() для дочерних
# процессов php-cgi через Unix socket
fastcgi.server = (".php" => ((
    "host"          => "127.0.0.1",
    "port"          => 9000,
    "check-local"   => "disable",
    "bin-environment" => ( "REDIRECT_STATUS" => "200" )
)))

# phpMyAdmin
alias.url = ("/phpmyadmin" => "PMA_PATH")

# Правила маршрутизации Majordomo
url.rewrite-if-not-file = (
    "^/panel/(.*)$"      => "/nf.php/$1",
    "^/ajax/(.*)$"       => "/nf.php/$1",
    "^/menu/(.*)$"       => "/nf.php/$1",
    "^/popup/(.*)$"      => "/nf.php/$1",
    "^/module/(.*)$"     => "/nf.php/$1",
    "^/apps/(.*)$"       => "/nf.php/$1",
    "^/page/(.*)$"       => "/nf.php/$1",
    "^/settings/(.*)$"   => "/nf.php/$1",
    "^/docs/(.*)$"       => "/nf.php/$1",
    "^/objects/(.*)$"    => "/objects/index.php/$1",
    "^/api\.php(.*)$"    => "/api.php$1",
    "^/api/(.*)$"        => "/api.php",
    "^/(.*\.html(.*))$"  => "/nf.php/$1"
)

mimetype.assign = (
    ".css"   => "text/css",
    ".js"    => "text/javascript",
    ".html"  => "text/html",
    ".htm"   => "text/html",
    ".png"   => "image/png",
    ".jpg"   => "image/jpeg",
    ".jpeg"  => "image/jpeg",
    ".gif"   => "image/gif",
    ".svg"   => "image/svg+xml",
    ".ico"   => "image/x-icon",
    ".json"  => "application/json",
    ".xml"   => "text/xml",
    ".txt"   => "text/plain",
    ".woff"  => "font/woff",
    ".woff2" => "font/woff2",
    ".ttf"   => "font/ttf",
    ".mp3"   => "audio/mpeg",
    ".ogg"   => "audio/ogg",
    ""       => "application/octet-stream"
)
