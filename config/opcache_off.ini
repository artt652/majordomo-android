; Отключение OPcache для Termux/Android
; shm_open() заблокирован на Android без root → php-cgi падает с Permission denied (13)
opcache.enable=0
opcache.enable_cli=0

; Подавляем некритичные ошибки — на PHP 8 они роняют циклы Majordomo
; Например: rmdir() на непустую папку в syncfiles.class.php
error_reporting = E_ALL & ~E_WARNING & ~E_NOTICE & ~E_DEPRECATED & ~E_STRICT
display_errors = Off
log_errors = On
