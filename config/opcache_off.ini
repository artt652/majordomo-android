; Отключение OPcache для Termux/Android
; shm_open() заблокирован на Android без root → php-cgi падает с Permission denied (13)
opcache.enable=0
opcache.enable_cli=0

; Подавляем некритичные ошибки — они роняют циклы на PHP 8
; E_ERROR и E_PARSE остаются видимыми
error_reporting = E_ALL & ~E_WARNING & ~E_NOTICE & ~E_DEPRECATED
display_errors = Off
log_errors = On

; Upload limits
post_max_size = 200M
upload_max_filesize = 50M
max_file_uploads = 150
max_input_time = 180

; PHP error log
error_log = /data/data/com.termux/files/home/htdocs/cycle_cached/php_errors.log
